<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wochenbudget</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Wochenbudget</h1>

    <div class="card">
      <div class="label">Restbudget</div>
      <div id="restbudget" class="big">-- €</div>
    </div>

    <div class="card">
      <div class="label">Ausgaben diese Woche</div>
      <div id="wochensumme" class="medium">-- €</div>
    </div>

    <div class="card">
      <label for="amount">Betrag</label>
      <input id="amount" type="number" step="0.01" placeholder="z. B. 5.50" />

      <label for="note">Notiz</label>
      <input id="note" type="text" placeholder="optional" />

      <button id="saveBtn">Speichern</button>
      <div id="msg"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
